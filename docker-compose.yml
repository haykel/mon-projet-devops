services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    platform: linux/arm64
    ports:
      - "8000:8000"
    environment:
      - KEYCLOAK_URL=http://host.docker.internal:8180
      - KEYCLOAK_REALM=investissement
      - KEYCLOAK_CLIENT_ID=backend
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - DB_NAME=investissement
      - DB_USER=django
      - DB_PASSWORD=Django2026!
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - REDIS_URL=redis://:Redis2026!@host.docker.internal:6379/0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      keycloak:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_KEYCLOAK_URL=http://localhost:8180
    platform: linux/arm64
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    platform: linux/arm64
    command: start-dev
    ports:
      - "8180:8080"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HEALTH_ENABLED=true
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
